<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спринт — PythonMemorio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #fa709a, #fee140, #f5576c, #ff9a9e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .option-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(245, 87, 108, 0.15);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .option-btn:hover {
            border-color: #f5576c;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.2);
        }
        .option-btn.correct {
            border-color: #43e97b;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        .option-btn.wrong {
            border-color: #f5576c;
            background: linear-gradient(135deg, #f5576c 0%, #ff6b6b 100%);
            color: white;
        }
        .level-btn {
            transition: all 0.3s ease;
        }
        .level-btn:hover, .level-btn.active {
            transform: scale(1.15);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
        }
        .timer-glow {
            text-shadow: 0 0 20px rgba(245, 87, 108, 0.5);
        }
        .score-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .streak-fire {
            animation: firePulse 0.5s ease;
        }
        @keyframes firePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
    </style>
</head>
<body class="px-4 py-6 md:px-8">

    <div class="max-w-3xl mx-auto">

        <!-- Header -->
        <div class="glass-card rounded-2xl p-4 md:p-5 mb-6 shadow-xl flex items-center justify-between" data-aos="fade-down">
            <a href="/" class="flex items-center gap-2 text-gray-600 hover:text-red-500 transition-colors font-bold">
                <i class="fas fa-arrow-left text-lg"></i>
                <span class="hidden sm:inline">На главную</span>
            </a>
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-red-600 rounded-xl flex items-center justify-center text-white text-sm shadow-md animate-pulse">
                    <i class="fas fa-bolt"></i>
                </div>
                <div>
                    <div class="font-black text-lg" style="background:linear-gradient(135deg,#fa709a,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Спринт</div>
                    <div class="text-xs text-gray-500 font-semibold">60 секунд на максимум!</div>
                </div>
            </div>
        </div>

        <!-- Выбор уровня -->
        <div id="level-select" class="glass-card rounded-3xl p-8 shadow-2xl text-center" data-aos="zoom-in">
            <div class="text-5xl mb-4">⚡</div>
            <h2 class="text-2xl font-black text-gray-800 mb-2">Выберите уровень</h2>
            <p class="text-gray-500 mb-8">Чем выше уровень — тем сложнее вопросы!</p>
            <div class="flex flex-wrap justify-center gap-3 mb-8">
                <button onclick="selectLevel(1)" class="level-btn w-16 h-16 rounded-2xl font-black text-xl bg-gradient-to-br from-green-400 to-green-600 text-white shadow-lg" data-level="1">1</button>
                <button onclick="selectLevel(2)" class="level-btn w-16 h-16 rounded-2xl font-black text-xl bg-gradient-to-br from-blue-400 to-blue-600 text-white shadow-lg" data-level="2">2</button>
                <button onclick="selectLevel(3)" class="level-btn w-16 h-16 rounded-2xl font-black text-xl bg-gradient-to-br from-yellow-400 to-orange-500 text-white shadow-lg" data-level="3">3</button>
                <button onclick="selectLevel(4)" class="level-btn w-16 h-16 rounded-2xl font-black text-xl bg-gradient-to-br from-purple-400 to-purple-600 text-white shadow-lg" data-level="4">4</button>
                <button onclick="selectLevel(5)" class="level-btn w-16 h-16 rounded-2xl font-black text-xl bg-gradient-to-br from-red-400 to-red-600 text-white shadow-lg" data-level="5">5</button>
            </div>
            <button onclick="startSprint()" id="start-btn" class="px-12 py-4 rounded-2xl font-bold text-lg text-white bg-gradient-to-r from-orange-500 to-red-500 shadow-xl hover:shadow-2xl transition-all hover:-translate-y-1 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                <i class="fas fa-rocket mr-2"></i>Начать спринт!
            </button>
        </div>

        <!-- Игровая область -->
        <div id="sprint-game" class="hidden">

            <!-- HUD -->
            <div class="grid grid-cols-3 gap-3 mb-6" data-aos="fade-down">
                <div class="glass-card rounded-2xl p-4 text-center shadow-lg">
                    <div class="text-3xl font-black text-red-500 timer-glow" id="timer">60</div>
                    <div class="text-xs text-gray-500 font-bold uppercase">Секунд</div>
                </div>
                <div class="glass-card rounded-2xl p-4 text-center shadow-lg">
                    <div class="text-3xl font-black text-yellow-500" id="score">0</div>
                    <div class="text-xs text-gray-500 font-bold uppercase">Баллы ⭐</div>
                </div>
                <div class="glass-card rounded-2xl p-4 text-center shadow-lg">
                    <div class="text-3xl font-black text-orange-500" id="streak">0</div>
                    <div class="text-xs text-gray-500 font-bold uppercase">Серия 🔥</div>
                </div>
            </div>

            <!-- Вопрос -->
            <div class="glass-card rounded-3xl p-8 shadow-2xl" data-aos="zoom-in">
                <div class="text-center mb-6">
                    <h2 class="text-xl md:text-2xl font-black text-gray-800" id="sprint-question">Загрузка...</h2>
                </div>
                <div class="grid grid-cols-1 gap-3" id="sprint-options">
                    <!-- Варианты -->
                </div>
            </div>
        </div>

        <!-- Результаты -->
        <div id="sprint-results" class="hidden">
            <div class="glass-card rounded-3xl p-8 md:p-12 shadow-2xl text-center" data-aos="zoom-in">
                <div class="text-6xl mb-4">⏰</div>
                <h2 class="text-3xl font-black text-gray-800 mb-2">Время вышло!</h2>
                <p class="text-gray-500 font-medium mb-8">Отличная скорость!</p>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-green-50 rounded-2xl p-4 border border-green-200">
                        <div class="text-3xl font-black text-green-600" id="sprint-correct">0</div>
                        <div class="text-xs text-green-700 font-semibold uppercase">Верно ✅</div>
                    </div>
                    <div class="bg-red-50 rounded-2xl p-4 border border-red-200">
                        <div class="text-3xl font-black text-red-500" id="sprint-wrong">0</div>
                        <div class="text-xs text-red-600 font-semibold uppercase">Ошибок ❌</div>
                    </div>
                    <div class="bg-yellow-50 rounded-2xl p-4 border border-yellow-200">
                        <div class="text-3xl font-black text-yellow-600" id="sprint-points">0</div>
                        <div class="text-xs text-yellow-700 font-semibold uppercase">Баллы ⭐</div>
                    </div>
                    <div class="bg-purple-50 rounded-2xl p-4 border border-purple-200">
                        <div class="text-3xl font-black text-purple-600" id="sprint-record">0</div>
                        <div class="text-xs text-purple-700 font-semibold uppercase">Рекорд 🏆</div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 justify-center">
                    <button onclick="restartSprint()" class="px-8 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-500 to-red-500 shadow-lg hover:shadow-xl transition-all hover:-translate-y-1">
                        <i class="fas fa-redo mr-2"></i>Заново
                    </button>
                    <a href="/" class="px-8 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-all">
                        <i class="fas fa-home mr-2"></i>На главную
                    </a>
                </div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true });</script>

    <script>
    let selectedLevel = null;
    let gameId = null;
    let timerInterval = null;
    let timeLeft = 60;
    let score = 0;
    let streak = 0;
    let correctCount = 0;
    let wrongCount = 0;

    function selectLevel(level) {
        selectedLevel = level;
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.classList.remove('active', 'ring-4', 'ring-white');
            if (parseInt(btn.dataset.level) === level) {
                btn.classList.add('active', 'ring-4', 'ring-white');
            }
        });
        document.getElementById('start-btn').disabled = false;
    }

    async function startSprint() {
        if (!selectedLevel) return;
        document.getElementById('level-select').classList.add('hidden');
        document.getElementById('sprint-game').classList.remove('hidden');

        const resp = await fetch('/api/game/sprint/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ level: selectedLevel })
        });
        const data = await resp.json();
        gameId = data.game_id;

        timeLeft = 60;
        score = 0;
        streak = 0;
        correctCount = 0;
        wrongCount = 0;

        updateHUD();
        loadSprintQuestion();

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            if (timeLeft <= 10) {
                document.getElementById('timer').classList.add('text-red-600');
            }
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finishSprint();
            }
        }, 1000);
    }

    function updateHUD() {
        document.getElementById('timer').textContent = timeLeft;
        document.getElementById('score').textContent = score;
        document.getElementById('streak').textContent = streak;
    }

    async function loadSprintQuestion() {
        const resp = await fetch(`/api/game/question/${gameId}`);
        const data = await resp.json();
        if (data.finished) {
            finishSprint();
            return;
        }

        document.getElementById('sprint-question').textContent = data.question;
        const container = document.getElementById('sprint-options');
        container.innerHTML = '';

        data.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn w-full text-left px-6 py-4 rounded-xl font-semibold text-gray-700 text-lg';
            btn.textContent = opt;
            btn.onclick = () => submitSprintAnswer(opt, btn, data.word_id);
            container.appendChild(btn);
        });
    }

    async function submitSprintAnswer(selected, btnElement, wordId) {
        document.querySelectorAll('#sprint-options button').forEach(b => b.onclick = null);

        const isCorrect = selected === document.getElementById('sprint-question').dataset.correct;
        // Определяем правильный ответ через API
        const resp = await fetch('/api/game/sprint/answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                game_id: gameId,
                word_id: wordId,
                answer: selected
            })
        });
        const data = await resp.json();

        if (data.is_correct) {
            btnElement.classList.add('correct');
            correctCount++;
            streak = data.streak;
            score = data.sprint_score;
        } else {
            btnElement.classList.add('wrong');
            wrongCount++;
            streak = 0;
            document.querySelectorAll('#sprint-options button').forEach(b => {
                if (b.textContent === data.correct_answer) b.classList.add('correct');
            });
        }

        updateHUD();

        // Анимация серии
        if (streak >= 5) {
            document.getElementById('streak').parentElement.classList.add('streak-fire');
            setTimeout(() => document.getElementById('streak').parentElement.classList.remove('streak-fire'), 500);
        }

        setTimeout(loadSprintQuestion, data.is_correct ? 500 : 1000);
    }

    async function finishSprint() {
        clearInterval(timerInterval);
        document.getElementById('sprint-game').classList.add('hidden');
        document.getElementById('sprint-results').classList.remove('hidden');

        const resp = await fetch('/api/game/sprint/finish', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ game_id: gameId })
        });
        const data = await resp.json();

        document.getElementById('sprint-correct').textContent = data.correct || correctCount;
        document.getElementById('sprint-wrong').textContent = data.wrong || wrongCount;
        document.getElementById('sprint-points').textContent = data.sprint_score || score;
        document.getElementById('sprint-record').textContent = data.sprint_record || 0;
    }

    function restartSprint() {
        document.getElementById('sprint-results').classList.add('hidden');
        document.getElementById('sprint-game').classList.add('hidden');
        document.getElementById('level-select').classList.remove('hidden');
        selectedLevel = null;
        document.getElementById('start-btn').disabled = true;
        document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active', 'ring-4', 'ring-white'));
        document.getElementById('timer').classList.remove('text-red-600');
    }
    </script>
</body>
</html>
