<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ game_title }} — PythonMemorio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .option-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(102, 126, 234, 0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .option-btn:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }
        .option-btn.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .option-btn.correct {
            border-color: #43e97b;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        .option-btn.wrong {
            border-color: #f5576c;
            background: linear-gradient(135deg, #f5576c 0%, #ff6b6b 100%);
            color: white;
        }
        .flashcard {
            perspective: 1000px;
            cursor: pointer;
        }
        .flashcard-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }
        .flashcard-front, .flashcard-back {
            backface-visibility: hidden;
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            background-size: 200% 100%;
            animation: gradient 3s ease infinite;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body class="px-4 py-6 md:px-8">

    <div class="max-w-3xl mx-auto">

        <!-- Header -->
        <div class="glass-card rounded-2xl p-4 md:p-5 mb-6 shadow-xl flex items-center justify-between" data-aos="fade-down">
            <a href="/" class="flex items-center gap-2 text-gray-600 hover:text-blue-600 transition-colors font-bold">
                <i class="fas fa-arrow-left text-lg"></i>
                <span class="hidden sm:inline">На главную</span>
            </a>
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-purple-600 rounded-xl flex items-center justify-center text-white text-sm shadow-md">
                    <i class="fas fa-star"></i>
                </div>
                <div>
                    <div class="font-black text-lg gradient-text">{{ game_title }}</div>
                    <div class="text-xs text-gray-500 font-semibold" id="level-display">Уровень: 1</div>
                </div>
            </div>
            <div class="text-sm font-bold text-gray-500" id="question-counter">1/10</div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-bar h-3 mb-6 shadow-inner" data-aos="fade-up" data-aos-delay="100">
            <div class="progress-fill h-full rounded-full" id="progress-bar" style="width: 0%"></div>
        </div>

        <!-- Игровая область -->
        <div id="game-area" data-aos="zoom-in" data-aos-duration="600">

            <!-- Викторина / Тренировка -->
            <div id="quiz-mode" class="hidden">
                <div class="glass-card rounded-3xl p-8 md:p-10 shadow-2xl mb-6">
                    <div class="text-center mb-8">
                        <div class="inline-block bg-gradient-to-br from-blue-100 to-purple-100 px-4 py-2 rounded-full text-sm font-bold text-blue-700 mb-4">
                            <i class="fas fa-question-circle mr-1"></i>Вопрос <span id="q-number">1</span> из <span id="q-total">10</span>
                        </div>
                        <h2 class="text-xl md:text-2xl font-black text-gray-800" id="question-text">Загрузка...</h2>
                    </div>
                    <div class="grid grid-cols-1 gap-3" id="options-container">
                        <!-- Варианты ответов -->
                    </div>
                </div>
            </div>

            <!-- Карточки -->
            <div id="cards-mode" class="hidden">
                <div class="flashcard" id="flashcard" onclick="flipCard()">
                    <div class="flashcard-inner relative w-full" style="min-height: 300px;">
                        <div class="flashcard-front glass-card rounded-3xl p-8 md:p-12 shadow-2xl flex flex-col items-center justify-center min-h-[300px]">
                            <div class="text-sm font-bold text-blue-500 mb-4 uppercase tracking-wider">
                                <i class="fas fa-hand-pointer mr-1"></i>Нажми чтобы увидеть ответ
                            </div>
                            <h2 class="text-2xl md:text-3xl font-black text-gray-800 text-center" id="card-front">Загрузка...</h2>
                            <div class="mt-6 text-sm text-gray-400 font-semibold" id="card-counter">Карточка 1 из 15</div>
                        </div>
                        <div class="flashcard-back absolute inset-0 glass-card rounded-3xl p-8 md:p-12 shadow-2xl flex flex-col items-center justify-center min-h-[300px] bg-gradient-to-br from-green-50 to-emerald-50">
                            <div class="text-sm font-bold text-green-500 mb-4 uppercase tracking-wider">
                                <i class="fas fa-lightbulb mr-1"></i>Ответ
                            </div>
                            <h2 class="text-2xl md:text-3xl font-black text-gray-800 text-center" id="card-back">Загрузка...</h2>
                        </div>
                    </div>
                </div>
                <div class="flex justify-center mt-6 gap-3">
                    <button onclick="nextCard(false)" class="px-6 py-3 rounded-xl font-bold text-red-600 bg-red-50 hover:bg-red-100 transition-all border border-red-200">
                        <i class="fas fa-times mr-1"></i>Не помню
                    </button>
                    <button onclick="nextCard(true)" class="px-6 py-3 rounded-xl font-bold text-green-600 bg-green-50 hover:bg-green-100 transition-all border border-green-200">
                        <i class="fas fa-check mr-1"></i>Помню!
                    </button>
                </div>
            </div>
        </div>

        <!-- Результаты -->
        <div id="results-screen" class="hidden">
            <div class="glass-card rounded-3xl p-8 md:p-12 shadow-2xl text-center" data-aos="zoom-in">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-black gradient-text mb-2">Отлично!</h2>
                <p class="text-gray-500 font-medium mb-8">Викторина завершена</p>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-green-50 rounded-2xl p-4 border border-green-200">
                        <div class="text-3xl font-black text-green-600" id="result-correct">0</div>
                        <div class="text-xs text-green-700 font-semibold uppercase">Верно ✅</div>
                    </div>
                    <div class="bg-red-50 rounded-2xl p-4 border border-red-200">
                        <div class="text-3xl font-black text-red-500" id="result-wrong">0</div>
                        <div class="text-xs text-red-600 font-semibold uppercase">Ошибок ❌</div>
                    </div>
                    <div class="bg-blue-50 rounded-2xl p-4 border border-blue-200">
                        <div class="text-3xl font-black text-blue-600" id="result-xp">+0</div>
                        <div class="text-xs text-blue-700 font-semibold uppercase">Опыт ⭐</div>
                    </div>
                    <div class="bg-yellow-50 rounded-2xl p-4 border border-yellow-200">
                        <div class="text-3xl font-black text-yellow-600" id="result-points">+0</div>
                        <div class="text-xs text-yellow-700 font-semibold uppercase">Баллы 🏆</div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 justify-center">
                    <button onclick="restartGame()" class="px-8 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-blue-500 to-purple-600 shadow-lg hover:shadow-xl transition-all hover:-translate-y-1">
                        <i class="fas fa-redo mr-2"></i>Заново
                    </button>
                    <a href="/" class="px-8 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-all">
                        <i class="fas fa-home mr-2"></i>На главную
                    </a>
                </div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true });</script>

    <script>
    const gameName = "{{ game_name }}";
    const gameTitle = "{{ game_title }}";
    let gameId = null;
    let currentQuestion = null;
    let totalQuestions = 10;
    let currentNum = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let totalXp = 0;
    let totalPoints = 0;
    let isFlipped = false;

    // Определение режима
    const isCards = gameName === 'cards';
    const isQuiz = gameName === 'quiz';

    // Показать нужный режим
    document.getElementById('quiz-mode').classList.toggle('hidden', !isQuiz && !isCards);
    document.getElementById('cards-mode').classList.toggle('hidden', !isCards);

    // Старт игры
    async function startGame() {
        const resp = await fetch('/api/game/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ game_name: gameName })
        });
        const data = await resp.json();
        gameId = data.game_id;
        totalQuestions = data.total_questions || 10;
        document.getElementById('q-total').textContent = totalQuestions;
        loadQuestion();
    }

    async function loadQuestion() {
        const resp = await fetch(`/api/game/question/${gameId}`);
        const data = await resp.json();
        if (data.finished) {
            showResults();
            return;
        }
        currentQuestion = data;
        currentNum = data.question_number;

        document.getElementById('q-number').textContent = currentNum;
        document.getElementById('question-counter').textContent = `${currentNum}/${totalQuestions}`;
        document.getElementById('progress-bar').style.width = `${(currentNum / totalQuestions) * 100}%`;

        if (isCards) {
            document.getElementById('card-front').textContent = data.question;
            document.getElementById('card-back').textContent = data.answer;
            document.getElementById('card-counter').textContent = `Карточка ${currentNum} из ${totalQuestions}`;
            isFlipped = false;
            document.getElementById('flashcard').classList.remove('flipped');
        } else {
            document.getElementById('question-text').textContent = data.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left px-6 py-4 rounded-xl font-semibold text-gray-700 text-lg';
                btn.textContent = opt;
                btn.onclick = () => submitAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        // Анимация
        AOS.refresh();
    }

    function flipCard() {
        isFlipped = !isFlipped;
        document.getElementById('flashcard').classList.toggle('flipped');
    }

    async function nextCard(knewIt) {
        if (!isFlipped && !knewIt) {
            flipCard();
            return;
        }
        await fetch('/api/game/answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                game_id: gameId,
                word_id: currentQuestion.word_id,
                answer: 'viewed'
            })
        });
        loadQuestion();
    }

    async function submitAnswer(selected, btnElement) {
        // Блокируем все кнопки
        document.querySelectorAll('.option-btn').forEach(b => b.onclick = null);

        const isCorrect = selected === currentQuestion.correct_answer;

        if (isCorrect) {
            btnElement.classList.add('correct');
            correctCount++;
        } else {
            btnElement.classList.add('wrong');
            wrongCount++;
            // Подсветить правильный
            document.querySelectorAll('.option-btn').forEach(b => {
                if (b.textContent === currentQuestion.correct_answer) b.classList.add('correct');
            });
        }

        const resp = await fetch('/api/game/answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                game_id: gameId,
                game_name: gameName,
                word_id: currentQuestion.word_id,
                answer: selected
            })
        });
        const data = await resp.json();

        if (data.xp_earned) totalXp += data.xp_earned;
        if (data.game_progress) totalPoints += data.xp_earned;

        setTimeout(() => loadQuestion(), isCorrect ? 800 : 1500);
    }

    function showResults() {
        document.getElementById('game-area').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        document.getElementById('result-correct').textContent = correctCount;
        document.getElementById('result-wrong').textContent = wrongCount;
        document.getElementById('result-xp').textContent = `+${totalXp}`;
        document.getElementById('result-points').textContent = `+${totalPoints}`;
    }

    function restartGame() {
        correctCount = 0;
        wrongCount = 0;
        totalXp = 0;
        totalPoints = 0;
        currentNum = 0;
        document.getElementById('results-screen').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        startGame();
    }

    // Загрузка уровня
    fetch(`/api/game/${gameName}/progress`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('level-display').textContent = `Уровень: ${data.level || 1}`;
        });

    startGame();
    </script>
</body>
</html>
