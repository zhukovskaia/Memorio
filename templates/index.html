<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запоминалка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        h1 {
            margin-top: 50px;
            font-size: 2.5em;
        }
        .button {
            display: inline-block;
            margin: 20px;
            padding: 15px 30px;
            background: white;
            color: #764ba2;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>🧠 Запоминалка</h1>
    <p>Приложение для умного запоминания</p>

    <a href="/study" class="button">Начать тренировку</a>

    <p style="margin-top: 50px; font-size: 0.8em;">
        PWA для учебной практики
    </p>
</body>
</html>
