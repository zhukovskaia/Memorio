<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренировка - Запоминалка</title>

    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#764ba2">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 24px;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-3px);
        }

        .stats {
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .scene {
            width: 100%;
            height: 350px;
            perspective: 1000px;
            margin: 20px 0;
            cursor: pointer;
        }

        .card-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-3d.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-front {
            background: white;
            color: #764ba2;
            transform: rotateY(0deg);
        }

        .card-back {
            background: white;
            color: #764ba2;
            transform: rotateY(180deg);
        }

        .question-word {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .result-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .result-message {
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        .correct-answer {
            font-size: 1.5em;
            font-weight: bold;
            color: #4ade80;
            margin-top: 15px;
        }

        .wrong-answer {
            font-size: 1.2em;
            color: #f87171;
            margin-top: 10px;
        }

        .hint {
            margin-top: 20px;
            font-size: 0.9em;
            color: #999;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .option-btn {
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .next-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .next-btn:hover:not(:disabled) {
            background: #5a67d8;
            transform: scale(1.02);
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress {
            margin: 20px 0;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: #4ade80;
            transition: width 0.3s ease;
            width: 0%;
        }

        .results {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: #333;
            animation: fadeIn 0.5s ease;
        }

        .results h2 {
            color: #764ba2;
            margin-bottom: 20px;
        }

        .results .score {
            font-size: 3em;
            font-weight: bold;
            color: #4ade80;
            margin: 20px 0;
        }

        .results-stats {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .disabled-click {
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn">← Назад</a>
        <div class="stats" id="stats">Вопрос 0/0</div>
    </div>

    <div id="trainingArea">
        <div class="progress">
            <div>Прогресс тренировки</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="scene">
            <div class="card-3d" id="card3d">
                <div class="card-front">
                    <div class="question-word" id="questionWord">Загрузка...</div>
                    <div class="hint">👆 Нажми на карточку после ответа</div>
                </div>
                <div class="card-back" id="cardBack">
                    <div class="result-icon" id="resultIcon"></div>
                    <div class="result-message" id="resultMessage"></div>
                    <div class="correct-answer" id="correctAnswer"></div>
                    <div class="wrong-answer" id="wrongAnswer"></div>
                </div>
            </div>
        </div>

        <div class="options" id="options">
            <button class="option-btn" data-answer="">Загрузка...</button>
            <button class="option-btn" data-answer="">Загрузка...</button>
            <button class="option-btn" data-answer="">Загрузка...</button>
            <button class="option-btn" data-answer="">Загрузка...</button>
        </div>

        <button id="nextBtn" class="next-btn" disabled>➡️ Далее</button>
    </div>

    <div id="resultsArea" class="results hidden">
        <h2>🎉 Тренировка завершена!</h2>
        <div class="score" id="score">0%</div>
        <div class="results-stats">
            <p>✅ Правильных ответов: <strong id="correctCount">0</strong></p>
            <p>❌ Неправильных ответов: <strong id="wrongCount">0</strong></p>
            <p>📊 Всего вопросов: <strong id="totalCount">0</strong></p>
        </div>
        <button class="next-btn" onclick="location.reload()">🔄 Новая тренировка</button>
        <a href="/" class="next-btn" style="display: inline-block; margin-top: 10px; text-decoration: none; text-align: center;">🏠 На главную</a>
    </div>

    <script>
        let currentQuestion = null;
        let currentWordId = null;
        let hasAnswered = false;
        let sessionId = null;
        let correctAnswers = 0;
        let wrongAnswers = 0;
        let questionsAnswered = 0;
        let totalQuestions = 0;

        async function startTraining() {
            try {
                const response = await fetch('/api/training/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ count: 10 })
                });

                const data = await response.json();
                sessionId = data.session_id;
                totalQuestions = data.total_questions;

                await loadQuestion();

            } catch (error) {
                console.error('Ошибка начала тренировки:', error);
                document.getElementById('questionWord').textContent = 'Ошибка загрузки';
            }
        }

        async function loadQuestion() {
            try {
                const response = await fetch(`/api/training/question/${sessionId}`);
                const data = await response.json();

                if (data.finished) {
                    finishTraining();
                    return;
                }

                currentQuestion = data;
                currentWordId = data.word_id;

                document.getElementById('questionWord').textContent = data.question;
                document.getElementById('stats').textContent = `Вопрос ${data.question_number}/${data.total_questions}`;

                const progress = ((data.question_number - 1) / data.total_questions) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;

                const optionButtons = document.querySelectorAll('.option-btn');
                data.options.forEach((option, index) => {
                    if (optionButtons[index]) {
                        optionButtons[index].textContent = option;
                        optionButtons[index].dataset.answer = option;
                        optionButtons[index].disabled = false;
                        optionButtons[index].style.background = 'rgba(255,255,255,0.2)';
                    }
                });

                hasAnswered = false;
                document.getElementById('nextBtn').disabled = true;

                const card3d = document.getElementById('card3d');
                card3d.classList.remove('flipped');
                card3d.classList.remove('disabled-click');

            } catch (error) {
                console.error('Ошибка загрузки вопроса:', error);
            }
        }

        async function handleAnswer(selectedAnswer) {
            if (hasAnswered) return;

            hasAnswered = true;

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = true;
            });

            try {
                const response = await fetch('/api/training/answer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        word_id: currentWordId,
                        answer: selectedAnswer
                    })
                });

                const result = await response.json();

                const resultIcon = document.getElementById('resultIcon');
                const resultMessage = document.getElementById('resultMessage');
                const correctAnswerDiv = document.getElementById('correctAnswer');
                const wrongAnswerDiv = document.getElementById('wrongAnswer');

                if (result.is_correct) {
                    resultIcon.textContent = '✅';
                    resultMessage.textContent = 'Правильно! 🎉';
                    correctAnswerDiv.textContent = `Правильный ответ: ${result.correct_answer}`;
                    wrongAnswerDiv.textContent = '';
                    correctAnswers++;
                } else {
                    resultIcon.textContent = '❌';
                    resultMessage.textContent = 'Неправильно!';
                    correctAnswerDiv.textContent = `Правильный ответ: ${result.correct_answer}`;
                    wrongAnswerDiv.textContent = `Ваш ответ: ${selectedAnswer}`;
                    wrongAnswers++;
                }

                questionsAnswered++;

                const progress = (questionsAnswered / totalQuestions) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
                document.getElementById('stats').textContent = `Вопрос ${questionsAnswered}/${totalQuestions}`;

                const card3d = document.getElementById('card3d');
                card3d.classList.add('flipped');

                if (result.finished) {
                    setTimeout(() => {
                        finishTrainingWithResults(result.results);
                    }, 1500);
                } else {
                    document.getElementById('nextBtn').disabled = false;
                }

            } catch (error) {
                console.error('Ошибка проверки ответа:', error);
                hasAnswered = false;
                document.querySelectorAll('.option-btn').forEach(btn => {
                    btn.disabled = false;
                });
            }
        }

        async function nextQuestion() {
            if (!hasAnswered) return;

            // Загружаем новый вопрос
            await loadQuestion();
        }

        function finishTrainingWithResults(results) {
            document.getElementById('score').textContent = `${results.percentage}%`;
            document.getElementById('correctCount').textContent = results.correct;
            document.getElementById('wrongCount').textContent = results.wrong;
            document.getElementById('totalCount').textContent = results.total;

            document.getElementById('trainingArea').classList.add('hidden');
            document.getElementById('resultsArea').classList.remove('hidden');
        }

        async function finishTraining() {
            const response = await fetch(`/api/training/session/${sessionId}/results`);
            const results = await response.json();

            document.getElementById('score').textContent = `${results.percentage}%`;
            document.getElementById('correctCount').textContent = results.correct;
            document.getElementById('wrongCount').textContent = results.wrong;
            document.getElementById('totalCount').textContent = results.total;

            document.getElementById('trainingArea').classList.add('hidden');
            document.getElementById('resultsArea').classList.remove('hidden');
        }

        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!hasAnswered) {
                    handleAnswer(btn.dataset.answer);
                }
            });
        });

        document.getElementById('nextBtn').addEventListener('click', nextQuestion);

        startTraining();
    </script>
</body>
</html>
