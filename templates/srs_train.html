<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Повторение SRS — PythonMemorio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #f093fb, #f5576c, #fa709a, #fee140);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
        }
        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .option-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(240, 147, 251, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .option-btn:hover {
            border-color: #f093fb;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.2);
        }
        .option-btn.correct {
            border-color: #43e97b;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        .option-btn.wrong {
            border-color: #f5576c;
            background: linear-gradient(135deg, #f5576c 0%, #ff6b6b 100%);
            color: white;
        }
        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #f093fb, #f5576c, #fa709a);
            background-size: 200% 100%;
            animation: gradient 3s ease infinite;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body class="px-4 py-6 md:px-8">

    <div class="max-w-3xl mx-auto">

        <!-- Header -->
        <div class="glass-card rounded-2xl p-4 md:p-5 mb-6 shadow-xl flex items-center justify-between" data-aos="fade-down">
            <a href="/" class="flex items-center gap-2 text-gray-600 hover:text-pink-500 transition-colors font-bold">
                <i class="fas fa-arrow-left text-lg"></i>
                <span class="hidden sm:inline">На главную</span>
            </a>
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gradient-to-br from-pink-400 to-rose-600 rounded-xl flex items-center justify-center text-white text-sm shadow-md animate-pulse">
                    <i class="fas fa-redo"></i>
                </div>
                <div>
                    <div class="font-black text-lg" style="background:linear-gradient(135deg,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Повторение</h2>
                    <div class="text-xs text-gray-500 font-semibold">SRS интервальное повторение</div>
                </div>
            </div>
            <div class="text-sm font-bold text-gray-500" id="counter">0/0</div>
        </div>

        <!-- Progress -->
        <div class="progress-bar h-3 mb-6 shadow-inner" data-aos="fade-up" data-aos-delay="100">
            <div class="progress-fill h-full rounded-full" id="progress-bar" style="width: 0%"></div>
        </div>

        <!-- Игровая область -->
        <div id="srs-area" data-aos="zoom-in" data-aos-duration="600">
            <div class="glass-card rounded-3xl p-8 md:p-10 shadow-2xl">
                <div class="text-center mb-8">
                    <div class="inline-block bg-gradient-to-br from-pink-100 to-rose-100 px-4 py-2 rounded-full text-sm font-bold text-pink-700 mb-4">
                        <i class="fas fa-redo mr-1"></i>Вопрос <span id="q-number">1</span> из <span id="q-total">10</span>
                    </div>
                    <h2 class="text-xl md:text-2xl font-black text-gray-800" id="question-text">Загрузка...</h2>
                </div>
                <div class="grid grid-cols-1 gap-3" id="options-container">
                    <!-- Варианты -->
                </div>
            </div>
        </div>

        <!-- Результаты -->
        <div id="srs-results" class="hidden">
            <div class="glass-card rounded-3xl p-8 md:p-12 shadow-2xl text-center" data-aos="zoom-in">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-black text-gray-800 mb-2">Повторение завершено!</h2>
                <p class="text-gray-500 font-medium mb-2">Слова распределены по интервалам SRS</p>
                <p class="text-gray-400 text-sm mb-8">Следующие повторения будут доступны позже</p>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-green-50 rounded-2xl p-4 border border-green-200">
                        <div class="text-3xl font-black text-green-600" id="result-correct">0</div>
                        <div class="text-xs text-green-700 font-semibold uppercase">Вспомнил ✅</div>
                    </div>
                    <div class="bg-red-50 rounded-2xl p-4 border border-red-200">
                        <div class="text-3xl font-black text-red-500" id="result-wrong">0</div>
                        <div class="text-xs text-red-600 font-semibold uppercase">Забыл 😕</div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 justify-center">
                    <a href="/" class="px-8 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-pink-500 to-rose-600 shadow-lg hover:shadow-xl transition-all hover:-translate-y-1">
                        <i class="fas fa-home mr-2"></i>На главную
                    </a>
                </div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true });</script>

    <script>
    let sessionId = null;
    let currentQuestion = null;
    let totalQuestions = 0;
    let currentNum = 0;
    let correctCount = 0;
    let wrongCount = 0;

    async function startSRSTraining() {
        // Проверяем, есть ли session_id в URL
        const urlParams = new URLSearchParams(window.location.search);
        const urlSession = urlParams.get('session');

        if (urlSession) {
            sessionId = urlSession;
            loadQuestion();
            return;
        }

        // Иначе создаём новую сессию
        const resp = await fetch('/api/training/srs', {
            method: 'GET'
        });
        const data = await resp.json();
        if (data.error) {
            alert(data.error);
            window.location.href = '/';
            return;
        }
        sessionId = data.session_id;
        totalQuestions = data.words_count;
        document.getElementById('q-total').textContent = totalQuestions;
        loadQuestion();
    }

    async function loadQuestion() {
        const resp = await fetch(`/api/training/question/${sessionId}`);
        const data = await resp.json();
        if (data.finished) {
            showResults();
            return;
        }
        currentQuestion = data;
        currentNum = data.question_number;

        if (totalQuestions === 0) totalQuestions = data.total_questions;

        document.getElementById('q-number').textContent = currentNum;
        document.getElementById('counter').textContent = `${currentNum}/${totalQuestions}`;
        document.getElementById('progress-bar').style.width = `${(currentNum / totalQuestions) * 100}%`;
        document.getElementById('question-text').textContent = data.question;

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        data.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn w-full text-left px-6 py-4 rounded-xl font-semibold text-gray-700 text-lg';
            btn.textContent = opt;
            btn.onclick = () => submitAnswer(opt, btn);
            container.appendChild(btn);
        });

        AOS.refresh();
    }

    async function submitAnswer(selected, btnElement) {
        document.querySelectorAll('.option-btn').forEach(b => b.onclick = null);

        const isCorrect = selected === currentQuestion.correct_answer;

        if (isCorrect) {
            btnElement.classList.add('correct');
            correctCount++;
        } else {
            btnElement.classList.add('wrong');
            wrongCount++;
            document.querySelectorAll('.option-btn').forEach(b => {
                if (b.textContent === currentQuestion.correct_answer) b.classList.add('correct');
            });
        }

        await fetch('/api/training/answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                session_id: sessionId,
                word_id: currentQuestion.word_id,
                answer: selected
            })
        });

        setTimeout(() => loadQuestion(), isCorrect ? 800 : 1500);
    }

    function showResults() {
        document.getElementById('srs-area').classList.add('hidden');
        document.getElementById('srs-results').classList.remove('hidden');
        document.getElementById('result-correct').textContent = correctCount;
        document.getElementById('result-wrong').textContent = wrongCount;
    }

    startSRSTraining();
    </script>
</body>
</html>
